name: renthus
description: "Plataforma de serviços profissionais"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management (Riverpod) - NOVO
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # UI
  cupertino_icons: ^1.0.6
  shimmer: ^3.0.0
  
  # Backend (Supabase)
  supabase_flutter: ^2.3.4
  
  # Models (Freezed) - NOVO
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  
  # Local Storage (Hive)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  
  # Network & Images
  cached_network_image: ^3.3.1
  http: ^1.2.0
  flutter_image_compress: ^2.1.0
  image: ^4.1.7
  
  # Navigation
  go_router: ^13.2.0
  app_links: ^6.3.2
  
  # Utils
  logger: ^2.0.2+1
  intl: ^0.20.2
  uuid: ^4.3.3
  flutter_dotenv: ^5.1.0
  
  # Firebase (Push Notifications)
  firebase_core: ^3.8.0
  firebase_messaging: ^15.2.0
  flutter_local_notifications: ^18.0.1
  
  # Image Handling
  image_picker: ^1.0.7
  image_cropper: ^8.0.0
  file_picker: ^10.0.0
  
  # Phone
  mask_text_input_formatter: ^2.9.0
  brasil_fields: ^1.14.0
  
  # Permissions
  permission_handler: ^11.3.0
  geolocator: ^11.0.0
  
  # Device Info
  device_info_plus: ^10.0.0
  package_info_plus: ^8.0.0
  
  # Share
  share_plus: ^10.0.0
  
  # PDF
  pdf: ^3.10.8

  # QR Code (PIX)
  qr_flutter: ^4.1.0

  path: any
  url_launcher: any
  fl_chart: any
dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^4.0.0
  
  # Code Generation - NOVO
  build_runner: ^2.4.9
  riverpod_generator: ^2.6.0
  freezed: ^2.4.7
  json_serializable: ^6.7.1

  # Testing
  mockito: ^5.4.4

  # App Icon & Splash
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.5

flutter:
  uses-material-design: true
  
  # Assets
  assets:
    - .env
    - assets/images/

# ============================================================================
# Flutter Launcher Icons Configuration
# https://pub.dev/packages/flutter_launcher_icons
# ============================================================================
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  
  # Android Adaptive Icon (Android 8.0+)
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  adaptive_icon_monochrome: "assets/images/app_icon.png"
  
  # iOS Configuration
  remove_alpha_ios: true
  
  # Web (opcional)
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
    background_color: "#FFFFFF"
    theme_color: "#FF6600"
  
  # Windows (opcional)
  windows:
    generate: true
    image_path: "assets/images/app_icon.png"
    icon_size: 48

# ============================================================================
# Flutter Native Splash Configuration
# https://pub.dev/packages/flutter_native_splash
# ============================================================================
flutter_native_splash:
  color: "#3B246B"
  image: "assets/images/renthus_icon_transparent.png"

  android: true
  android_12:
    color: "#3B246B"
    image: "assets/images/renthus_icon_transparent.png"
    icon_background_color: "#3B246B"

  ios: true
  web: false
  fullscreen: true
